<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKARFOOTWEAR - PUSAT KOMANDO V5</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003399">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-box">
        <h3 style="margin: 0; font-size: 16px;">📦 SCANNER PAKET KELUAR V5</h3>
        <a href="retur.html" class="btn-nav">🔄 Pindah ke Scan RETUR</a>
        <a href="upload.html" class="btn-nav">🔄 Upload CSV</a>
    </div>

    <div class="dash-container">
        <div class="dash-card"><h4>Hari Ini</h4><p id="load-hari-ini">0</p></div>
        <div class="dash-card"><h4>Hari Lalu</h4><p id="load-kemarin">0</p></div>
        <div class="dash-card"><h4>Minggu Ini</h4><p id="load-minggu">0</p></div>
    </div>

    <div id="bca-indicator"></div>
    <div id="status-message">Menyalakan Kamera...</div>

    <div class="card">
        <div id="reader"></div>
        <div style="margin-top: 10px;">
            <button id="startBtn" class="btn btn-primary">Aktifkan Kamera Scanner</button>
        </div>
    </div>

    <div class="card">
        <h3>Input Manual Resi</h3>
        <input type="text" id="manualResi" placeholder="Masukkan nomor resi...">
        <button id="manualBtn" class="btn btn-primary">Simpan Resi</button>
    </div>

    <div class="card" style="padding: 10px;">
        <button class="btn-offline" onclick="downloadOfflineData()">📥 Download Data Offline</button>
        <div style="font-size: 12px; color: #64748b; margin-top: 5px; font-weight: 600;">Data Antrean HP: <span id="local-slot">0</span> resi</div>
    </div>

    <div id="notif"></div>

    <div class="card">
        <h3>Riwayat Terakhir</h3>
        <div class="history-container">
            <table>
                <thead><tr><th>Resi</th><th>Status</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

   <script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
