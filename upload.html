<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resi - SEKAROFFICIAL</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" style="max-width: 800px; margin: 20px auto;">
    <h3>Paste Teks Pesanan Tokopedia/TikTok</h3>
    <textarea id="rawText" placeholder="Paste teks di sini..." style="width: 100%; height: 300px; margin: 10px 0; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none;"></textarea>
    <button id="uploadBtn" class="btn btn-primary">Proses & Upload ke Sheet</button>
    <div id="status" style="margin-top: 15px; text-align: center; font-weight: bold; color: #64748b;"></div>
</div>

<script src="config.js"></script>
<script src="upload-script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
            .then(() => console.log('PWA Service Worker Terdaftar!'));
    }
</script>
</body>
</html>
